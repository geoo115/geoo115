<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <!-- Background -->
  <rect width="1200" height="300" fill="black"/>
  
  <!-- Binary code pattern in background -->
  <g fill="#222222" font-family="monospace" font-size="14">
    <text x="50" y="30">01001110 01100101 01110111</text>
    <text x="50" y="60">01000111 01101111 01101100</text>
    <text x="50" y="90">01000001 01010000 01001001</text>
    <text x="50" y="120">01000100 01100001 01110100</text>
    <text x="50" y="150">01010011 01111001 01110011</text>
    <text x="50" y="180">01000011 01101111 01100100</text>
    <text x="50" y="210">01001011 01100001 01100110</text>
    <text x="50" y="240">01010010 01100101 01100100</text>
    <text x="50" y="270">01001100 01101001 01101110</text>
    
    <text x="850" y="30">01000111 01101111 01101100</text>
    <text x="850" y="60">01000001 01010000 01001001</text>
    <text x="850" y="90">01000100 01100001 01110100</text>
    <text x="850" y="120">01010011 01111001 01110011</text>
    <text x="850" y="150">01000011 01101111 01100100</text>
    <text x="850" y="180">01001011 01100001 01100110</text>
    <text x="850" y="210">01010010 01100101 01100100</text>
    <text x="850" y="240">01001100 01101001 01101110</text>
    <text x="850" y="270">01001110 01100101 01110111</text>
  </g>
  
  <!-- CPU Shape -->
  <g transform="translate(300, 150)">
    <rect x="-75" y="-75" width="150" height="150" fill="none" stroke="#444" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#444" stroke-width="2"/>
    <rect x="-60" y="-60" width="120" height="120" fill="none" stroke="#444" stroke-width="1"/>
    <line x1="-75" y1="-25" x2="-100" y2="-25" stroke="#444" stroke-width="2"/>
    <line x1="-75" y1="25" x2="-100" y2="25" stroke="#444" stroke-width="2"/>
    <line x1="75" y1="-25" x2="100" y2="-25" stroke="#444" stroke-width="2"/>
    <line x1="75" y1="25" x2="100" y2="25" stroke="#444" stroke-width="2"/>
    <line x1="-25" y1="-75" x2="-25" y2="-100" stroke="#444" stroke-width="2"/>
    <line x1="25" y1="-75" x2="25" y2="-100" stroke="#444" stroke-width="2"/>
    <line x1="-25" y1="75" x2="-25" y2="100" stroke="#444" stroke-width="2"/>
    <line x1="25" y1="75" x2="25" y2="100" stroke="#444" stroke-width="2"/>
  </g>
  
  <!-- GPU Shape -->
  <g transform="translate(850, 150)">
    <rect x="-80" y="-40" width="160" height="80" fill="none" stroke="#444" stroke-width="2"/>
    <rect x="-70" y="-30" width="140" height="60" fill="none" stroke="#444" stroke-width="1"/>
    <rect x="-60" y="-20" width="120" height="40" fill="none" stroke="#444" stroke-width="1"/>
    
    <!-- GPU Cooling Fins -->
    <g fill="none" stroke="#444" stroke-width="1">
      <line x1="-75" y1="-50" x2="-75" y2="-70" />
      <line x1="-55" y1="-50" x2="-55" y2="-70" />
      <line x1="-35" y1="-50" x2="-35" y2="-70" />
      <line x1="-15" y1="-50" x2="-15" y2="-70" />
      <line x1="5" y1="-50" x2="5" y2="-70" />
      <line x1="25" y1="-50" x2="25" y2="-70" />
      <line x1="45" y1="-50" x2="45" y2="-70" />
      <line x1="65" y1="-50" x2="65" y2="-70" />
      <line x1="-80" y1="-65" x2="80" y2="-65" />
    </g>
    
    <!-- Connection pins -->
    <g fill="none" stroke="#444" stroke-width="1">
      <line x1="-60" y1="40" x2="-60" y2="55" />
      <line x1="-40" y1="40" x2="-40" y2="55" />
      <line x1="-20" y1="40" x2="-20" y2="55" />
      <line x1="0" y1="40" x2="0" y2="55" />
      <line x1="20" y1="40" x2="20" y2="55" />
      <line x1="40" y1="40" x2="40" y2="55" />
      <line x1="60" y1="40" x2="60" y2="55" />
    </g>
  </g>
  
  <!-- Circuit lines connecting CPU and GPU -->
  <path d="M 400 120 L 550 120 L 550 180 L 730 180" fill="none" stroke="#444" stroke-width="1"/>
  <path d="M 400 180 L 500 180 L 500 150 L 730 150" fill="none" stroke="#444" stroke-width="1"/>
  <path d="M 400 150 L 480 150 L 480 120 L 730 120" fill="none" stroke="#444" stroke-width="1"/>
  
  <!-- Name in center -->
  <text x="600" y="165" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">GEORGE SAAD</text>
  
  <!-- Binary 0101 decoration -->
  <text x="430" y="220" font-family="monospace" font-size="24" fill="#555555">01010101010101</text>
  <text x="740" y="220" font-family="monospace" font-size="24" fill="#555555">10101010101010</text>
</svg>
